# Production release pipeline for poppim-web.
# Path (the ONLY normal release path — see docs/cicd.md):
#   push to main  ->  verify  ->  build+publish image to GHCR  ->  trigger Coolify
#   ->  Coolify pulls the published image and runs it.
# GitHub Actions never SSHes into the server or runs docker on it.
name: deploy

on:
  push:
    branches: [main]
    # Docs-only changes don't need a production build (§29). Keep this list narrow.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - '.claudeignore'
      - '.cursorignore'
      - '.dockerignore'
      - 'LICENSE'

# Newer commit on the same branch cancels an in-flight run (§27).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/u2giants/poppim-web
  # Coolify deployment platform (runtime owner). uuid is not a secret; token is.
  COOLIFY_URL: http://178.156.180.212:8000
  COOLIFY_APP_UUID: ysvdyj3t7d5tyh5ogrvlka4y

jobs:
  # 1) Verify — lint + strict typecheck/build gate. Must pass before publishing.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build # tsc -b && vite build — fails on type errors

  # 2) Publish — build the production image and push it to GHCR (immutable + mutable tags).
  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GITHUB_TOKEN may push to GHCR; no PAT needed
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_RUN=${{ github.run_id }}
          # sha-<commit> is the immutable audit/rollback tag; main is the convenience pointer (§6.2/§18).
          tags: |
            ${{ env.IMAGE }}:main
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) Deploy — trigger Coolify by API (§7). Coolify pulls the just-published :main and runs it.
  #    poppim-web is a Coolify *service* (docker-compose), not an application, so the correct
  #    trigger is /api/v1/services/{uuid}/restart — the /api/v1/deploy?uuid= endpoint only
  #    works for Coolify application resources and silently no-ops on services.
  #    Actions does NOT mutate the server (§3/§10).
  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify service restart
        run: |
          curl -fsS -X GET \
            "${COOLIFY_URL}/api/v1/services/${COOLIFY_APP_UUID}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Wait for production to come up on new image
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # Coolify restarts the service and pulls :main. Poll until the running container
          # serves version.json with the new git_sha (nginx serves it directly; Caddy's
          # try_files does not intercept existing files).
          for attempt in {1..30}; do
            body="$(curl -fsS --max-time 10 "https://pm.designflow.app/version.json" 2>/dev/null || true)"
            live_sha="$(printf '%s' "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('git_sha',''))" 2>/dev/null || true)"

            if [ "$live_sha" = "$EXPECTED_SHA" ]; then
              echo "Production is serving ${EXPECTED_SHA}."
              exit 0
            fi

            echo "Attempt ${attempt}/30: live='${live_sha:-missing}', expected='${EXPECTED_SHA}'."
            sleep 10
          done

          echo "::warning::Deploy triggered but version.json did not confirm ${EXPECTED_SHA} within 5 min. Service may still be pulling — check Coolify."
          # Don't hard-fail: the restart was queued; a slow pull is not a deployment failure.
