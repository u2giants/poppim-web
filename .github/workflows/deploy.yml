# Production release pipeline for poppim-web.
# Path (the ONLY normal release path — see docs/cicd.md):
#   push to main  ->  verify  ->  build+publish image to GHCR  ->  trigger Coolify
#   ->  Coolify pulls the published image and runs it.
# GitHub Actions never SSHes into the server or runs docker on it.
name: deploy

on:
  push:
    branches: [main]
    # Docs-only changes don't need a production build (§29). Keep this list narrow.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - '.claudeignore'
      - '.cursorignore'
      - '.dockerignore'
      - 'LICENSE'

# Newer commit on the same branch cancels an in-flight run (§27).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/u2giants/poppim-web
  # Coolify deployment platform (runtime owner). uuid is not a secret; token is.
  COOLIFY_URL: http://178.156.180.212:8000
  COOLIFY_APP_UUID: ysvdyj3t7d5tyh5ogrvlka4y

jobs:
  # 1) Verify — lint + strict typecheck/build gate. Must pass before publishing.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build # tsc -b && vite build — fails on type errors

  # 2) Publish — build the production image and push it to GHCR (immutable + mutable tags).
  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GITHUB_TOKEN may push to GHCR; no PAT needed
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read commit metadata
        id: commit
        run: |
          commit_date="$(git show -s --format=%cI "$GITHUB_SHA")"
          echo "date=${commit_date}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VCS_REF=${{ github.sha }}
            COMMIT_DATE=${{ steps.commit.outputs.date }}
            BUILD_RUN=${{ github.run_id }}
          # sha-<commit> is the immutable audit/rollback tag; main is the convenience pointer (§6.2/§18).
          tags: |
            ${{ env.IMAGE }}:main
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) Deploy — trigger Coolify by API (§7). Coolify pulls the just-published image and runs it.
  #    poppim-web is a Coolify *service* (docker-compose), not an application, so we must
  #    update the service's docker_compose_raw to reference the immutable :sha-<commit> tag
  #    before restarting. The :main tag is cached locally by Docker and /restart would just
  #    restart the old container; a unique SHA tag is never cached, so Coolify's start
  #    (docker compose up -d) is forced to pull from GHCR.
  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Point Coolify service at the new SHA-tagged image and redeploy
        run: |
          SHA="${{ github.sha }}"
          IMAGE_TAG="ghcr.io/u2giants/poppim-web:sha-${SHA}"

          # Build the minimal docker-compose for the service (same shape as docker_compose_raw).
          DC_RAW=$(printf 'services:\n  poppim-web:\n    image: '"'"'%s'"'"'\n    environment:\n      SERVICE_FQDN_POPPIMWEB_80: pm-ci.designflow.app\n    expose:\n      - '"'"'80'"'"'\n    restart: unless-stopped\n' "$IMAGE_TAG")

          # Patch the service to reference the new SHA tag so docker compose sees a fresh image.
          curl -fsS -X PATCH \
            "${COOLIFY_URL}/api/v1/services/${COOLIFY_APP_UUID}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"docker_compose_raw\": $(printf '%s' "$DC_RAW" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}"

          # Stop then start: stop tears down the old container; start does docker compose up -d
          # with the updated config, which pulls the new SHA tag since it is never cached.
          curl -fsS -X GET \
            "${COOLIFY_URL}/api/v1/services/${COOLIFY_APP_UUID}/stop" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

          sleep 12

          curl -fsS -X GET \
            "${COOLIFY_URL}/api/v1/services/${COOLIFY_APP_UUID}/start" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Verify production is serving this commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
          BASE_URL: https://pm.designflow.app
        run: |
          # index.html contains <meta name="build-sha" content="<sha>"> (baked by Vite).
          # Caddy always serves index.html for all routes, so we grep it directly.
          # Cache-busting query string prevents stale CDN/proxy responses.
          for attempt in {1..30}; do
            html="$(curl -fsS --max-time 10 "${BASE_URL}/?_v=${EXPECTED_SHA}-${attempt}" 2>/dev/null || true)"
            if printf '%s' "$html" | grep -Fq "${EXPECTED_SHA}"; then
              echo "Production is serving ${EXPECTED_SHA}."
              exit 0
            fi
            echo "Attempt ${attempt}/30: production has not updated to ${EXPECTED_SHA} yet."
            sleep 10
          done

          echo "::error::Coolify restart completed, but production did not serve ${EXPECTED_SHA} within 5 min."
          exit 1
