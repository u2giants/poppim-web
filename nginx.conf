server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  # SPA fallback: serve index.html for any non-file route
  location / {
    try_files $uri $uri/ /index.html;
  }
  # cache hashed assets aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
